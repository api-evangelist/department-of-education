specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Department of Education
providerId: department-of-education
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - College Scorecard
  - Education
  - Federal Government
  - Higher Education
  - IPEDS
  - K-12
