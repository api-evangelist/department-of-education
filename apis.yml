aid: department-of-education
name: Department of Education
description: >-
  The U.S. Department of Education (ED) is a federal agency that manages and
  coordinates federal assistance to education and establishes policy for it.
  ED's mission is to promote student achievement and preparation for global
  competitiveness, and to ensure equal access to education. The Department
  exposes a portfolio of public APIs through api.data.gov, NCES, and the Open
  Data Platform (ODP) at data.ed.gov for postsecondary outcomes, institutional
  characteristics, and federal education programs.
type: Index
